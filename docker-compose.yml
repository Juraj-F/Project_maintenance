version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: project_maintenance_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: maintenance
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/db/seed_users.sql:/docker-entrypoint-initdb.d/02-seed_users.sql
      # - ./server/db/seed_issues.sql:/docker-entrypoint-initdb.d/03-seed_issues.sql
      

volumes:
  postgres_data:
